let currentCategory = 'all';

function switchCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tabs button[onclick*="${cat}"]`).classList.add('active');
  renderTools();
}

function filterTools() {
  renderTools();
}

function renderTools() {
  const search = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('toolsContainer');

  // Group by category
  const categories = {
    chat: { name: 'AI 对话', icon: '💬', tools: [] },
    image: { name: 'AI 绘画', icon: '🎨', tools: [] },
    video: { name: 'AI 视频', icon: '🎬', tools: [] },
    audio: { name: 'AI 音频', icon: '🎵', tools: [] },
    code: { name: '编程', icon: '💻', tools: [] },
    search: { name: 'AI 搜索', icon: '🔍', tools: [] },
    write: { name: 'AI 写作', icon: '✍️', tools: [] },
    network: { name: '网络工具', icon: '🔧', tools: [] },
    other: { name: '更多', icon: '📦', tools: [] }
  };

  tools.forEach(t => {
    if (currentCategory !== 'all' && t.cat !== currentCategory) return;
    if (search && !t.name.toLowerCase().includes(search) && !t.desc.toLowerCase().includes(search)) return;
    if (categories[t.cat]) categories[t.cat].tools.push(t);
  });

  let html = '';
  for (const [key, cat] of Object.entries(categories)) {
    if (cat.tools.length === 0) continue;
    html += `<div class="category-section"><h2>${cat.icon} ${cat.name}</h2><div class="tools">`;
    cat.tools.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
    cat.tools.forEach(t => {
      const tagHtml = t.tags.map(tag => `<span class="tag ${tag === '免费' ? 'free' : tag === '付费' ? 'paid' : 'freemium'}">${tag}</span>`).join('');
      html += `<div class="tool-card" onclick="window.open('${t.url}','_blank')">
        <div class="icon">${t.icon}</div>
        <h3>${t.name}</h3>
        <p>${t.desc}</p>
        <div class="tags">${tagHtml}</div>
      </div>`;
    });
    html += `</div></div>`;
  }
  container.innerHTML = html || '<p style="text-align:center;color:var(--muted);padding:40px 0;">没有找到匹配的工具</p>';
}

renderTools();
